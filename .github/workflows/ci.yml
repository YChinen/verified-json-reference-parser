name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:run

  verify:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
          node-version: ${{ matrix.node }}
          cache: npm

    - name: Install Node deps
      run: npm ci

    - name: Typecheck
      run: npm run typecheck

    - name: Build
      run: npm run build

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Python deps
      run: |
        python -m pip install --upgrade pip
        pip install z3-solver

    - name: Z3 verification
      run: npm run verify:z3
  proof:
    runs-on: ubuntu-latest
    container: 
      image: rocq/rocq-prover:9.0.1
      options: --user 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build proofs
        run: |
          make -C proof/rocq